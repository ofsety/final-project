<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StockX Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<nav class="bg-white shadow-md px-8 py-4 flex justify-between">
    <h1 class="text-xl font-bold text-gray-800">StockX Tracker</h1>

    <div class="space-x-4">
        {% if request.user.is_authenticated %}
            <a href="{% url 'logout' %}" class="text-gray-600 hover:text-black">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}" class="text-gray-600 hover:text-black">Register</a>
        {% endif %}

        <a href= "{% url 'tracking_price' %}" class="text-gray-600 hover:text-black">Tracking</a>
        <a href="{% url 'history' %}" class="text-gray-600 hover:text-black">History</a>
        <a href="{% url 'profile' %}" class="text-gray-600 hover:text-black">Profile</a>
    </div>
</nav>

<div class="max-w-4xl mx-auto p-8">
    {% block content %}{% endblock %}
</div>

</body>
</html>
