{% extends "base.html" %}

{% block content %}


<head>
    <meta charset="UTF-8">
    <title>StockX Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

    <div class="max-w-4xl mx-auto p-8">
        
        <div class="flex flex-col items-center justify-center min-h-[70vh] text-center">

    
            <div class="bg-white shadow-lg rounded-3xl p-12 mb-8 max-w-3xl">
                <h2 class="text-5xl font-bold text-gray-800 mb-4">Home</h2>
                <p class="text-lg text-gray-600">
                    Відслідковуйте ціну на Stockx у реальному часі! 
                    Зарееструйтесь чи залогінтесь, якщо ви вже зареестровані
                </p>
            </div>

        
            <div class="flex gap-5">
                <a href="{% url 'login' %}"
                    class="group px-10 py-4 bg-gradient-to-r from-blue-500 to-blue-600 text-white font-semibold rounded-2xl shadow-lg hover:shadow-2xl hover:from-blue-600 hover:to-blue-700 transition-all duration-300 transform hover:-translate-y-1">
                    <span class="flex items-center gap-2">
                        Login
                        <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 7l5 5m0 0l-5 5m5-5H6" />
                        </svg>
                    </span>
                </a>
                <a href="{% url 'register' %}"
                    class="group px-10 py-4 bg-white border-2 border-gray-800 text-gray-800 font-semibold rounded-2xl shadow-lg hover:shadow-2xl hover:bg-gray-800 hover:text-white transition-all duration-300 transform hover:-translate-y-1">
                    <span class="flex items-center gap-2">
                        Register
                        <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                        </svg>
                    </span>
                </a>
            </div>
        </div>
    </div>

</body>

</html>

{% endblock %}
