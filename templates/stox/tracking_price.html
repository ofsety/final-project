{% extends "base.html" %}

{% block content %}

<div class="bg-white rounded-2xl shadow-lg p-8">

    <h2 class="text-2xl font-bold mb-6">Check StockX Price</h2>

    <form method="POST" class="space-y-4">
        {% csrf_token %}

        <input name="url"
               placeholder="https://stockx.com/..."
               class="w-full border rounded-xl p-3"/>

        <input name="size"
               placeholder="Size (EU 42)"
               class="w-full border rounded-xl p-3"/>

        <button
            class="bg-black text-white px-6 py-3 rounded-xl hover:bg-gray-800 w-full">
            Check price
        </button>
    </form>

</div>

{% endblock %}
