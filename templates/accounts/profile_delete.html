{% extends "base.html" %}
{% block content %}

<div class="max-w-xl mx-auto mt-10 bg-white p-8 rounded-2xl shadow">

    <h2 class="text-2xl font-bold mb-6 text-red-600">
        Delete Account
    </h2>

    <p class="mb-6 text-gray-600">
        This action cannot be undone.
        All your data will be permanently deleted.
    </p>

    <form method="post">
        {% csrf_token %}

        <button class="bg-red-500 text-white px-6 py-2 rounded-xl hover:bg-red-600">
            Confirm Delete
        </button>
    </form>

</div>

{% endblock %}
