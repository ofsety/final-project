{% extends "base.html" %}
{% block content %}

<div class="max-w-xl mx-auto mt-10 bg-white p-8 rounded-2xl shadow">

    <h2 class="text-2xl font-bold mb-6">Edit Profile</h2>

    <form method="post">
        {% csrf_token %}

        <label class="block mb-2 text-sm text-gray-600">Username</label>
        <input type="text"
               name="username"
               value="{{ profile.user.username }}"
               class="w-full border p-2 rounded mb-6">

        <label class="block mb-2 text-sm text-gray-600">Region</label>
        <input type="text"
               name="region"
               value="{{ profile.region }}"
               class="w-full border p-2 rounded mb-6">

        <button class="bg-blue-500 text-white px-6 py-2 rounded-xl hover:bg-blue-600">
            Save Changes
        </button>
    </form>

</div>

{% endblock %}
